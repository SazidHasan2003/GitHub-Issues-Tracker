<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        font-family: "Geist", sans-serif;
        background: #f8fafc;
        overflow-x: hidden;
      }

      .nav-container {
        max-width: 1600px;
        margin: auto;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- LOGIN PAGE -->
    <section id="loginPage">
      <div class="flex items-center justify-center min-h-screen p-4">
        <div
          class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100"
        >
          <div class="flex flex-col items-center mb-8">
            <div class="mb-2">
              <img src="./assets/github-logo.png" alt="github logo" />
            </div>
            <h1 class="text-2xl font-bold text-gray-800">
              GitHub Issues Tracker
            </h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
          </div>

          <form id="loginForm" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Username</label
              >
              <input
                type="text"
                id="username"
                placeholder="Enter Username"
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm"
              />
              <p class="text-indigo-600 text-xs mt-1">Default: admin</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Password</label
              >
              <input
                type="password"
                id="password"
                placeholder="Enter Password"
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm"
              />
              <p class="text-indigo-600 text-xs mt-1">Default: admin123</p>
            </div>

            <button
              type="submit"
              class="w-full bg-[#4F00FF] text-white py-2.5 rounded-md font-semibold hover:bg-blue-700 transition duration-200"
            >
              Sign In
            </button>
          </form>

          <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
              <span class="w-full border-t border-gray-300"></span>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-2 bg-white text-gray-500">OR</span>
            </div>
          </div>

          <div class="bg-gray-50 p-4 rounded-lg text-center">
            <p class="text-gray-400 text-xs mb-2">Demo Credentials:</p>
            <p class="text-sm text-gray-700 font-medium">
              Username: <span class="font-bold">admin</span>
            </p>
            <p class="text-sm text-gray-700 font-medium">
              Password: <span class="font-bold">admin123</span>
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
